<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | AI Outfit Finder</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="nav-bar">
            <a class="nav-brand" href="index.html">AI Outfit Finder</a>
            <div class="nav-links" id="navLinks">
                <a href="login.html">Login</a>
                <a href="register.html">Register</a>
            </div>
            <div class="nav-user hidden" id="navUser">
                <button id="profileBtn" class="profile-btn" title="Open profile">
                    <span id="profileInitial"></span>
                </button>
                <button id="logoutBtn" class="secondary-btn">Logout</button>
            </div>
        </nav>
    </header>

    <main class="form-page">
        <div class="profile-card">
            <h1>Your Profile</h1>
            <p>Update your email or password using the form below.</p>

            <form id="profileForm" class="auth-form">
                <div class="field-group">
                    <label for="username">Username</label>
                    <input id="username" name="username" type="text" disabled>
                </div>
                <div class="field-group">
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" placeholder="you@example.com">
                </div>
                <div class="field-group">
                    <label for="password">New Password</label>
                    <input id="password" name="password" type="password" placeholder="Leave blank to keep current password">
                </div>
                <div class="button-row">
                    <button type="submit" class="primary-btn">Save Changes</button>
                    <button type="button" id="cancelBtn" class="secondary-btn">Cancel</button>
                </div>
            </form>

            <div id="profileError" class="error-message hidden"></div>
            <div id="profileSuccess" class="success-message hidden"></div>
        </div>
    </main>

    <script src="profile.js"></script>
</body>
</html>
