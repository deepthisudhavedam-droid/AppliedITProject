<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | AI Outfit Finder</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="nav-bar">
            <a class="nav-brand" href="index.html">AI Outfit Finder</a>
            <div class="nav-links">
                <a href="login.html">Login</a>
                <a href="register.html">Register</a>
            </div>
        </nav>
    </header>

    <main class="form-page">
        <div class="auth-card">
            <h1>Reset Password</h1>
            <p>Enter your email and a new password to recover your account.</p>

            <form id="forgotPasswordForm" class="auth-form">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" placeholder="you@example.com" required>

                <label for="newPassword">New Password</label>
                <input id="newPassword" name="newPassword" type="password" placeholder="Enter new password" required>

                <button type="submit" class="primary-btn">Reset Password</button>
            </form>

            <div id="formError" class="error-message hidden"></div>
            <div id="formSuccess" class="success-message hidden"></div>
            <p class="auth-note">Remembered your password? <a href="login.html">Log in</a>.</p>
        </div>
    </main>

    <script src="forgot-password.js"></script>
</body>
</html>
