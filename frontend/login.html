<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AI Outfit Finder</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="nav-bar">
            <a class="nav-brand" href="index.html">AI Outfit Finder</a>
            <div class="nav-links">
                <a href="register.html">Register</a>
                <a href="index.html">Home</a>
            </div>
        </nav>
    </header>

    <main class="form-page">
        <div class="auth-card">
            <h1>Log In</h1>
            <p>Access your AI outfit suggestions and save your session.</p>

            <form id="loginForm" class="auth-form">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" placeholder="you@example.com" required>

                <label for="password">Password</label>
                <input id="password" name="password" type="password" placeholder="Enter password" required>

                <button type="submit" class="primary-btn">Log In</button>
            </form>

            <div id="formError" class="error-message hidden"></div>
            <p class="auth-note"><a href="forgot-password.html">Forgot password?</a></p>
            <p class="auth-note">Don’t have an account? <a href="register.html">Create one now</a>.</p>
        </div>
    </main>

    <script src="app-utils.js"></script>
    <script src="login.js"></script>
</body>
</html>
