<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | AI Outfit Finder</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="nav-bar">
            <a class="nav-brand" href="index.html">AI Outfit Finder</a>
            <div class="nav-links">
                <a href="login.html">Login</a>
                <a href="index.html">Home</a>
            </div>
        </nav>
    </header>

    <main class="form-page">
        <div class="auth-card">
            <h1>Create Account</h1>
            <p>Register with your email and password to start using the outfit finder.</p>

            <form id="registerForm" class="auth-form">
                <label for="username">Username</label>
                <input id="username" name="username" type="text" placeholder="Your name" required>

                <label for="email">Email</label>
                <input id="email" name="email" type="email" placeholder="you@example.com" required>

                <label for="password">Password</label>
                <input id="password" name="password" type="password" placeholder="Choose a password" required>

                <button type="submit" class="primary-btn">Register</button>
            </form>

            <div id="formError" class="error-message hidden"></div>
            <p class="auth-note">Already have an account? <a href="login.html">Log in</a>.</p>
        </div>
    </main>

    <script src="app-utils.js"></script>
    <script src="register.js"></script>
</body>
</html>
