<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Outfit Matchmaker</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav class="nav-bar">
            <a class="nav-brand" href="index.html">AI Outfit Finder</a>
            <div class="nav-links" id="navLinks">
                <a href="login.html" id="navLogin">Login</a>
                <a href="register.html" id="navRegister">Register</a>
            </div>
            <div class="nav-user hidden" id="navUser">
                <button id="profileBtn" class="profile-btn" title="Open profile">
                    <span id="profileInitial"></span>
                </button>
                <button id="logoutBtn" class="secondary-btn">Logout</button>
            </div>
        </nav>
    </header>

    <!-- HERO SECTION -->
    <section class="hero" id="home">
        <div class="hero-content">
            <h1>AI Outfit Finder</h1>
            <p>Upload your clothing and get perfect outfit ideas for any occasion</p>
            <button id="tryItNowBtn" class="primary-btn">Try It Now</button>
        </div>
    </section>

    <!-- GENERATOR SECTION -->
    <section class="generator" id="generator">
        <div class="container">
            <h2>Find Your Perfect Match</h2>

            <!-- Upload Box -->
            <div class="upload-container" id="dropZone">
                <input type="file" id="fileInput" accept="image/png, image/jpeg" hidden>

                <div class="upload-placeholder" id="uploadPlaceholder">
                    <p>Drag & Drop your image here</p>
                    <span>or click to browse (JPG, PNG)</span>
                </div>

                <div class="preview-container hidden" id="previewContainer">
                    <img id="imagePreview" src="" alt="Uploaded Clothing">
                    <button id="removeImageBtn" class="icon-btn">✕</button>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls-container">
                <button id="generateBtn" class="primary-btn generate-btn" disabled>
                    <span class="btn-text">Generate Outfit Ideas</span>
                    <div class="spinner hidden" id="loadingSpinner"></div>
                </button>

                <div id="errorContainer" class="error-message hidden"></div>
            </div>
        </div>
    </section>

    <!-- RESULTS SECTION -->
    <section class="results hidden" id="resultsSection">
        <div class="container">
            <div class="detected-tags">
                <h3>Detected Item</h3>
                 <div class="tags-container">
                    <span class="tag" id="categoryTag">Category: -</span>
                    <span class="tag" id="colorTag">Color: -</span>
                    <span class="tag" id="styleTag">Style: -</span>
                    <span class="tag" id="patternTag">Pattern: -</span>
                    <span class="tag" id="genderTag">Gender: -</span>
                    <span class="tag" id="fitTag">Fit: -</span>

                </div>
            </div>

            <h3 style="text-align: center; margin-top: 50px; margin-bottom: 30px;">Suggested Outfits</h3>

            <div class="results-grid" id="resultsGrid">
                <!-- Outfit cards will be inserted here by JavaScript -->
            </div>

            <div class="action-footer">
                <button id="regenerateBtn" class="secondary-btn">Start Over</button>
            </div>
        </div>
    </section>

    <script src="app-utils.js"></script>
    <script src="script.js"></script>
</body>
</html>
